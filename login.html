```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STMU Admission Portal Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#001f3f,
#003366,
#00509e,
#0074D9
);
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,0.1);
border-radius:50%;
top:-200px;
left:-100px;
animation:float 8s infinite ease-in-out;
}

body::after{
content:'';
position:absolute;
width:400px;
height:400px;
background:rgba(255,255,255,0.08);
border-radius:50%;
bottom:-150px;
right:-100px;
animation:float 10s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(30px);}
100%{transform:translateY(0px);}
}

.container{

width:420px;

background:rgba(255,255,255,0.15);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.2);

padding:40px;

border-radius:25px;

box-shadow:0 15px 35px rgba(0,0,0,0.3);

animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
font-size:60px;
color:white;
margin-bottom:10px;
}

h1{
text-align:center;
color:white;
font-size:28px;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#dbeafe;
font-size:14px;
margin-bottom:30px;
}

.input-group{
position:relative;
margin-bottom:20px;
}

.input-group i{
position:absolute;
left:15px;
top:15px;
color:#003366;
}

.input-group input{
width:100%;
padding:14px 14px 14px 45px;
border:none;
border-radius:12px;
outline:none;
font-size:15px;
}

.input-group input:focus{
box-shadow:0 0 10px #60a5fa;
}

button{

width:100%;
padding:14px;

border:none;

border-radius:12px;

background:white;

color:#003366;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:white;
}

.error{
text-align:center;
margin-top:15px;
color:#ffb4b4;
font-size:14px;
font-weight:500;
}

</style>

<script>

function loginStudent(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

let error =
document.getElementById("error");

if(username==="test@123"
&& password==="stmu@123")
{
window.location.href="instructions.html";
}
else
{
error.innerHTML=
"Invalid Username or Password";
}

}

</script>

</head>

<body>

<div class="container">

<div class="logo">
<i class="fas fa-graduation-cap"></i>
</div>

<h1>STMU Admission Portal</h1>

<p class="subtitle">
BS Software Engineering - Fall 2026
</p>

<div class="input-group">
<i class="fas fa-user"></i>
<input
type="text"
id="username"
placeholder="Enter Username">
</div>

<div class="input-group">
<i class="fas fa-lock"></i>
<input
type="password"
id="password"
placeholder="Enter Password">
</div>

<button onclick="loginStudent()">
Login
</button>

<div id="error" class="error"></div>

<div class="footer">
Shifa Tameer-e-Millat University<br>
Park Road Campus, Islamabad
</div>

</div>

</body>
</html>
